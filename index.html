rder."},{"deck":"ZooKeeper","ref":"zxid & sync","q":"What are zxid and the sync command for?","a":"<b>zxid</b> (transaction ID) preserves ordering: a client can't reconnect to a server that's behind — zxids ensure the new server is at least as up-to-date. <b>sync /path</b> handles <b>hidden channels</b> (clients coordinating directly, e.g. via a socket, which could bypass ZK ordering): it flushes pending updates on the target node before a read — similar to the weak-consistency model."},{"deck":"ZooKeeper","ref":"ZK leader election","q":"How does ZooKeeper elect a leader internally?","a":"Each server s has id(s) and a counter tx(s) of the latest transaction it handled. A suspecting follower broadcasts ⟨voteID, voteTX⟩ = ⟨id(s), tx(s)⟩ and tracks leader(s), lastTX(s). On receiving a vote: if voteTX is newer, or equal-TX with a higher voteID, adopt it; else rebroadcast its own. The <b>most up-to-date</b> server wins (ties broken by highest ID) — like a bully algorithm. When a server collects the same vote from a quorum it knows the leader; everyone resyncs to the latest transaction (a ~200 ms delay mitigates premature leader declaration)."},{"deck":"ZooKeeper","ref":"ZK workload","q":"What workload is ZooKeeper designed for?","a":"Workloads where <b>reads ≫ writes</b> (from 2:1 to 100:1). Many reads scale across servers (≈460k ops/s at 100% reads with 13 servers); but writes use expensive quorum replication, so adding servers slows writes — fewer servers are better for write-heavy loads."},{"deck":"IoT & WSN","ref":"IoT def","q":"What is the Internet of Things?","a":"A set of interconnected computing devices that autonomously coordinate, <b>acquire data (sensors) and act (actuators) in the physical world</b>, and are seamlessly integrated with information systems and the Internet. Roots in ubiquitous/pervasive computing (Weiser: 'the most profound technologies are those that disappear')."},{"deck":"IoT & WSN","ref":"CPS","q":"What is a cyber-physical system?","a":"A system that uses <b>feedback</b> to influence the physical world: it <b>observes</b> (sensing), <b>reasons</b> in the cyber world (computation), and <b>influences</b> the physical world (actuation). Related terms: embedded systems, Industrial IoT / Industry 4.0 (e.g. condition monitoring and predictive maintenance — knowing a part will fail before it does)."},{"deck":"IoT & WSN","ref":"WSN feature","q":"What is the distinctive feature of a wireless sensor network?","a":"A <b>self-organizing topology with multi-hop communication</b>: replace few expensive sensors with many cheap, short-range ones. Since transmit power ≈ distance², many short hops give more coverage with less energy (and no wires). WSNs/IoT are massively decentralized, networked <b>embedded</b> systems — you can't ignore the physical layer or deployment environment."},{"deck":"IoT & WSN","ref":"Energy","q":"Why is energy the dominant concern, and what is duty cycling?","a":"On low-power nodes (e.g. TMote Sky), the <b>radio dominates power consumption</b>, and 1 message ≈ 1000 instructions — communication is far costlier than computation (and needs both TX and RX). <b>Duty cycling</b> (turning the radio off — mA when on, μA asleep) is a must, but it complicates the protocol stack."},{"deck":"IoT & WSN","ref":"Wireless woes","q":"What makes low-power wireless links difficult?","a":"Limited range (needs multi-hop); unstable links varying in space/time/frequency/direction; <b>non-isotropic</b> range and <b>asymmetric</b> links; <b>collisions and the hidden-terminal problem</b>; link quality affected by environment (temperature, humidity, people); 'what-you-see-is-not-what-you-get' topologies (good links to far nodes, bad to near ones)."},{"deck":"IoT & WSN","ref":"WSN MAC","q":"What MAC schemes dominate in WSNs and their trade-offs?","a":"Goals: avoid collisions and turn the radio off when possible (simpler than conventional MACs; some work pushed to the application). Dominant: <b>CSMA</b> (carrier sense, with preamble sampling) — good for changing topologies but suffers under heavy load; and <b>TDMA</b> (time division) — predictable performance but needs time synchronization."},{"deck":"IoT & WSN","ref":"Interaction patterns","q":"What communication/interaction patterns characterize WSN applications?","a":"<ul><li><b>Many-to-one</b> (convergecast): many sensors funnel data to a sink — data collection.</li><li><b>One-to-many</b>: queries, parameter changes, commands, code dissemination.</li><li><b>One-to-one</b>: classic client-server.</li><li><b>Many-to-many</b>: sense-and-react / distributed control.</li></ul>Mainstream computing is dominated by one-to-one, but sensing is inherently many-to-one."},{"deck":"IoT & WSN","ref":"WSN OS","q":"How do WSN operating systems differ from mainstream ones?","a":"They give only basic run-time support for application programs, no user-interaction support. Programs are <b>cross-compiled</b> and linked with the OS library into a binary deployed on the node (often reprogrammed remotely, since nodes lack keyboard/monitor and sit in inaccessible places). <b>Contiki</b> is a popular choice; others: TinyOS (old), RIOT, FreeRTOS, Zephyr. WSN software tends to be application-specific (cross-layer), unlike the application-agnostic layering of conventional systems."},{"deck":"Past Exam · Jul 2017","ref":"Q1 Leader election","q":"Concisely state the leader-election problem, give an algorithm, and an example use.","a":"<b>Problem</b>: make all (non-failed) processes agree on a single coordinator, typically when the old one fails; nodes must be distinguishable (IDs). <b>Algorithm — Bully</b>: a process noticing the failure sends ELECTION to all higher IDs; if one answers it drops out, else it wins and announces COORDINATOR. Assumes reliable links and crash detection. <b>Example</b>: choosing the coordinator for centralized mutual exclusion, or the primary in primary-backup replication."},{"deck":"Past Exam · Jul 2017","ref":"Q2 Serializability","q":"Explain serializability informally and the idea of 2PL.","a":"<b>Serializability</b>: a concurrent execution of transactions is correct if its effect equals running them one-at-a-time in <i>some</i> serial order — achieved when all conflicting operation pairs run in the same order at every shared object. <b>2PL</b>: a transaction acquires locks in a growing phase and releases in a shrinking phase, never acquiring after the first release; conflicting transactions are thus forced into a consistent order, guaranteeing serializability (strict 2PL holds locks until commit to avoid cascading aborts)."},{"deck":"Past Exam · Jul 2017","ref":"Q3 Scalar clocks","q":"Show that a→b ⇒ C(a)&lt;C(b) but C(a)&lt;C(b) ⇏ a→b for scalar clocks.","a":"By the Lamport update rules, if a happens-before b then C(a)&lt;C(b) always holds (consistency). The converse fails: two <b>concurrent</b> events (no happens-before path between them) can still receive scalar clocks with C(a)&lt;C(b). So a smaller clock does not prove causal precedence — scalar clocks lack <b>strong</b> clock consistency (that needs vector clocks)."},{"deck":"Past Exam · Jul 2017","ref":"Q4 Client-centric","q":"What is client-centric vs data-centric consistency? (Read-Your-Writes context)","a":"<b>Data-centric</b> models guarantee a system-wide consistent view of the store for all processes under concurrent updates. <b>Client-centric</b> models guarantee properties only from the viewpoint of a <b>single client</b> across possibly different replicas (e.g. <b>Read-Your-Writes</b>: a client always sees its own prior write). They are cheap to provide on eventually-consistent stores and don't constrain what other clients see."},{"deck":"Past Exam · Jul 2017","ref":"Q5 Dynamic binding","q":"Describe the dynamic-binding problem and the RPC vs RMI solutions.","a":"<b>Problem</b>: a client must find which process provides a service and how to communicate with it, without hard-wiring it. <b>Sun RPC</b>: a local <b>portmap</b> daemon maps service IDs to ports (client must know the host); DCE adds a directory/binder for location transparency. <b>Java RMI</b>: query the local <b>rmiregistry</b> (Naming.lookup) to obtain a remote reference (a serializable stub), or receive one via parameter passing; thereafter it's used like a local reference."},{"deck":"Past Exam · Jul 2017","ref":"Q6 2PC/3PC recovery","q":"After a coordinator crash, how do 2PC and 3PC survivors recover?","a":"<b>2PC, survivors all in READY</b>: they can neither commit nor abort safely (coordinator may have decided either way and crashed) → they must <b>block</b> until the coordinator recovers. <b>3PC, some in PRECOMMIT (P), some READY</b>: elect a new coordinator; by P1 nobody could have committed-then-this-state inconsistently — it moves all uncertain (READY) cohorts to PRECOMMIT, then COMMITs everyone. (If all survivors were in READY with none in P, they could safely ABORT.)"},{"deck":"Past Exam · Jul 2017","ref":"Q7 FloodSet","q":"In FloodSet with n=4, f=2, h=min, why f+1 rounds and what is the decision?","a":"Run f+1 = <b>3 rounds</b>: each round broadcast your set, union received sets. With at most one crash per round over 3 rounds there's at least one <b>failure-free round</b> where all sets equalize, so every correct process ends with the same set and, applying h=min deterministically, decides the same value (the minimum proposed value that has fully propagated). The f+1 rounds guarantee agreement despite up to f crashes."},{"deck":"FT3 · Message Ordering","ref":"Reasoning","q":"Given two messages m, m' multicast by the SAME process, what does FIFO require?","a":"If the sender p sends m before m' (S<sub>p</sub>(m) → S<sub>p</sub>(m')), then every receiver q must <b>deliver m before m'</b> (D<sub>q</sub>(m) → D<sub>q</sub>(m')). It says nothing about messages from different senders, nor about receive order — only delivery order of one sender's stream."},{"deck":"FT3 · Message Ordering","ref":"Causal example","q":"If process P receives m then sends m', why must causal ordering deliver m before m' everywhere?","a":"Receiving m happens-before sending m' (same process), so S(m) → S(m'). By the definition of causal ordering, every receiver r must deliver m before m' (D<sub>r</sub>(m) → D<sub>r</sub>(m')) — because m' may causally depend on the content of m (e.g. a reply must not arrive before the message it answers)."},{"deck":"FT3 · Message Ordering","ref":"Why ordering matters","q":"Why does message ordering matter for replicated state machines?","a":"Replicas must process the same requests in the same order to stay consistent (state-machine approach). The required strength depends on the application: <b>total ordering</b> guarantees identical state; weaker orderings (FIFO/causal) suffice when only some operations conflict, and are cheaper to provide."},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Replication · Update Propagation","q":"Briefly discuss the advantages and drawbacks of push-based update propagation compared to pull-based. Under what workload conditions is each approach more appropriate?","a":"Push <i>proactively</i> sends updates to all replicas; pull <i>reactively</i> fetches an update only when a client needs it.<ul><li><b>Push pros:</b> replicas are always up-to-date; no staleness at read time; natural fit for multicast-friendly networks.</li><li><b>Push cons:</b> wastes bandwidth if most replicas are never read before the next update; server must maintain a list of all subscribers; poor when #writes ≫ #reads.</li><li><b>Pull pros:</b> zero overhead when data is never read; no per-client state at the server; client controls when to refresh.</li><li><b>Pull cons:</b> potentially stale read (fetch-update latency); polling traffic when updates are frequent.</li><li><b>Rule of thumb:</b> push suits #reads ≫ #writes (CDNs, mirrors); pull suits #reads ≪ #writes (client caches).</li><li><b>Leases</b> blend both: server pushes until a timeout, then reverts to pull—adapts to changing workloads.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Replication · What to Propagate","q":"When propagating an update to replicas, three strategies exist: notify (invalidation), transfer modified data, and propagate the update operation. Explain the tradeoffs among them.","a":"The choice trades communication overhead against computation at the replica.<ul><li><b>Invalidation (notify only):</b> smallest message; replica must fetch fresh data on next read; best when writes are far more frequent than reads—avoids transferring data that will be overwritten before being read.</li><li><b>Transfer modified data:</b> replica immediately has the new value; read response time is instant; best when reads dominate writes.</li><li><b>Propagate operation (active replication):</b> message can be very small (just the operation description); receiver re-executes the update; good when the operation is cheap but the data item is large. Risk: all replicas must be <i>deterministic</i> state machines—any non-determinism causes divergence.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Replication · Primary-Backup vs Active","q":"Compare primary-backup (passive) replication and active (state-machine) replication. What does each approach require from the replicated process, and what are the respective failure-tolerance implications?","a":"Both keep multiple copies for fault tolerance, but differ in who does the work.<ul><li><b>Primary-backup:</b> only the primary executes requests; backups receive the result and update their state. Simple to implement; the process need not be deterministic. Weakness: on primary crash, a backup must take over—brief window of unavailability; the 'non-blocking write' variant (primary ACKs before backups confirm) risks losing updates on simultaneous crash.</li><li><b>Active replication:</b> all replicas execute every request in the same order (requires <i>totally ordered</i> multicast). Faster recovery—survivors already have full state—but requires replicas to be <i>deterministic state machines</i> (same input → same output). Non-determinism (e.g., random IDs, wall-clock timestamps) must be handled explicitly.</li><li><b>k-fault tolerance:</b> passive needs k+1 replicas (k backups); active needs k+1 for crash failures, 2k+1 for Byzantine.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Replication · Quorum-Based","q":"Explain how quorum-based replication enforces sequential consistency. Why must the constraints N_R + N_W > N and N_W > N/2 hold simultaneously?","a":"Quorums require a <i>voting majority</i> before any read or write proceeds, ensuring at least one replica always knows the latest write.<ul><li><b>N_R + N_W &gt; N</b> ensures every read quorum and every write quorum share at least one replica → a read always encounters the latest written version (identified by its version number).</li><li><b>N_W &gt; N/2</b> ensures any two write quorums overlap → two concurrent writes cannot both 'commit' without seeing each other, preventing write-write divergence.</li><li>If either constraint is relaxed: e.g., N_R + N_W ≤ N allows a read quorum to miss the latest write entirely, returning a stale value—violating sequential consistency.</li><li><b>Flexibility:</b> the constraints let you tune the read/write trade-off: N_R=1, N_W=N (read-one/write-all) optimises for reads; high N_R, low N_W optimises for writes—as long as both constraints are satisfied.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Consistency Models","q":"Strict consistency is widely considered impractical in distributed systems. Explain why, and describe what weaker consistency model is typically used instead when a system-wide total order is still needed.","a":"Strict consistency requires <i>all writes to be instantaneously visible everywhere</i> and defines 'most recent' in terms of absolute physical time—both impossible in a distributed setting.<ul><li>No shared global clock exists; the speed of light introduces a lower bound on propagation delay.</li><li>Even with perfect clocks, making a write visible at every node before any other operation completes would require blocking the entire system.</li><li>In practice it is achievable only inside a uniprocessor machine (using cache coherence + a global bus).</li><li><b>Sequential consistency</b> is the practical alternative: all processes see the same global ordering of operations, but that ordering need not correspond to physical time. Achievable with modest overhead (e.g., using a primary server or totally ordered multicast) and sufficiently intuitive for most applications.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Consistency Models · Hierarchy","q":"The relationship between FIFO, causal, and total ordering is not symmetric. Explain which relationships hold between these three delivery schemes and why.","a":"The three schemes are <i>partially ordered</i> by strength, and total ordering is orthogonal to the other two.<ul><li><b>Causal ⊇ FIFO:</b> causal ordering requires that whenever S_p(m) → S_q(m') (happens-before), then D_r(m) → D_r(m') for every receiver r. FIFO is the special case where p = q (same sender). So causal implies FIFO; the converse does not hold.</li><li><b>Total ordering is independent:</b> total ordering only constrains that all processes see the same delivery order for any two messages—it says nothing about causality or sender order. You can have total but not causal, causal but not total, or both.</li><li><b>Practical implication:</b> if you need causal + total, you must enforce both explicitly (e.g., totally ordered causal multicast). The combination is strictly stronger than either alone.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Consistency Models · Weak/Release/Entry","q":"Weak consistency does not guarantee that all writes are visible at all times. What is the underlying idea, and why is it still useful in practice?","a":"Weak consistency exploits the observation that not all writes need to be globally visible continuously—only at well-defined <i>synchronisation points</i>.<ul><li>Writes are propagated only when the writing process explicitly synchronises (e.g., exits a critical section). Until then, other processes may see stale data.</li><li>Three rules: (1) accesses to synchronisation variables are sequentially consistent; (2) no sync operation is allowed until all previous writes have propagated; (3) no data read/write is allowed until all previous sync operations complete.</li><li><b>Usefulness:</b> most writes inside a critical section are irrelevant to other processes until the section ends. Weak consistency avoids the expensive global coordination that would be needed to keep all replicas up to date at every write, drastically reducing communication overhead.</li><li>Release and entry consistency refine this further: release consistency distributes writes on unlock; entry consistency only imports writes relevant to the acquired lock.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Consistency Models · Client-Centric","q":"What problem do client-centric consistency models solve that data-centric models do not? Give a concrete example and name the four client-centric guarantees.","a":"Data-centric models give system-wide guarantees; client-centric models give per-client guarantees, handling the case where a single client accesses different replicas over time.<ul><li><b>Problem:</b> a user reads their email from a replica in Paris, then connects from a phone via a replica in New York. The New York replica may not yet have the updates the Paris replica has, making the user see older messages—confusing and inconsistent from that user's perspective.</li><li><b>Four guarantees:</b><ul><li><b>Monotonic reads:</b> successive reads never return an older value than a previous read.</li><li><b>Monotonic writes:</b> a write is completed before any later write by the same process (preserves write order).</li><li><b>Read-your-writes:</b> after a write, the same process always sees that write in subsequent reads.</li><li><b>Writes-follow-reads:</b> a write following a read is performed on a version at least as recent as what was read.</li></ul></li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Middleware · RPC Stubs & IDL","q":"Explain the concept of a stub in RPC and the role of the rpcgen tool. Why, together, are they a fundamental component of the RPC runtime?","a":"A <b>stub</b> is a piece of automatically generated code that provides the illusion of a local call to the programmer while handling all distribution machinery underneath.<ul><li><b>Client stub:</b> marshals (serialises + converts) the call parameters into a network message, sends it, waits for the reply, and unmarshals the result—all transparent to the caller.</li><li><b>Server stub:</b> receives the message, unmarshals parameters, invokes the actual server procedure, marshals the result and sends it back.</li><li><b>rpcgen</b> reads an IDL (Interface Definition Language) description of the service (e.g., a .x file in ONC RPC) and automatically generates both stubs plus a shared header. Without this tool the programmer would have to write all serialisation, byte-order conversion, and network communication code by hand—error-prone and language/platform-specific.</li><li><b>Fundamental because:</b> stubs are what actually makes RPC 'transparent'—the programmer writes normal procedure calls while the stubs handle the entire network layer. The IDL/rpcgen pipeline also enforces a clean separation between interface (what the service does) and implementation (how).</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Middleware · RPC vs Local Call","q":"RPC was designed to make remote calls look like local calls. In reality, several fundamental differences remain. What are the most important ones, and why can they not be fully hidden?","a":"Full transparency is impossible because distribution introduces properties that local calls simply do not have.<ul><li><b>Partial failures:</b> the server, the network, or the client can fail independently. A local call either succeeds or the whole process crashes; an RPC can fail in many distinguishable ways (server not found, request lost, reply lost, server crashed mid-execution) with no reliable way to tell them apart in an asynchronous system.</li><li><b>No pass-by-reference:</b> pointers are address-space local; RPC must fall back to call-by-value/result with different semantics, or emulate references with IDs and extra network round trips.</li><li><b>Invocation semantics:</b> on a timeout, should the client retry? If it does, the server may execute the operation twice (<i>at-least-once</i>); if it does not, the operation might not complete (<i>at-most-once</i>). Choosing the right semantic depends on whether the operation is idempotent.</li><li><b>Performance:</b> marshalling, serialisation, and network latency add orders of magnitude of overhead compared to a local call.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Middleware · Dynamic Binding","q":"What is the dynamic binding problem in RPC, and why is hard-wiring the server's address into the client code undesirable? Describe one standard solution.","a":"Dynamic binding is the problem of <i>finding</i> which server process provides a given service at runtime—without requiring the client to know the server's location in advance.<ul><li><b>Why hard-wiring is bad:</b> if the server moves to a different host or port, all clients must be recompiled or reconfigured. It destroys location transparency and makes the system brittle.</li><li><b>Sun RPC solution (portmap / rpcbind):</b> each host runs a <i>portmap</i> daemon on a well-known port. When a server starts it registers its service identifier and the dynamically assigned port with portmap. Clients contact portmap first, obtain the port, then communicate directly with the server. Limitation: portmap is local—it only solves the second sub-problem (how to reach the server). Clients still need to know which host to query.</li><li><b>DCE solution:</b> adds a distributed directory service (binder daemon) so clients need only know where the directory is, not the server—achieving full location transparency.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Middleware · Message-Oriented vs RPC","q":"Message-oriented middleware (MOM) is often described as providing stronger decoupling than RPC. Explain what is meant by decoupling in this context and what advantages it brings.","a":"Decoupling means components can interact without being simultaneously active, spatially co-located, or bound to a fixed interface.<ul><li><b>Time decoupling:</b> in MOM (e.g., message queuing) the sender deposits a message in a queue and continues; the receiver processes it later. In RPC the caller is blocked until the callee responds—tight temporal coupling.</li><li><b>Space decoupling:</b> the sender does not need to know the identity or location of the receiver; it only knows the queue name or topic. RPC requires the client to know the server's address.</li><li><b>Advantages:</b> components can be upgraded, restarted, or scaled independently without disrupting others. Queues naturally provide load levelling—spikes in requests buffer up rather than dropping. Easier to add consumers (pub-sub) without changing producers.</li><li><b>Drawback:</b> asynchronous semantics are harder to reason about; getting a result back requires the caller to poll a reply queue or register a callback—more complex than a simple return value.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT Basics · Failure Modes","q":"The course distinguishes several failure modes for servers (crash, omission, timing, response, Byzantine). Why does this classification matter for fault tolerance design?","a":"Each failure mode requires a different masking strategy, and more severe modes require more costly redundancy.<ul><li><b>Crash (fail-stop):</b> simplest—the server halts and produces no more output. Detectable via timeouts in synchronous systems; maskable with k+1 replicas.</li><li><b>Omission:</b> server may silently drop messages; retransmission and ACK protocols handle this.</li><li><b>Timing / performance:</b> responses arrive outside the specified window; relaxed timeouts or replication can help.</li><li><b>Response (value/state-transition):</b> wrong output; requires majority voting among replicas to detect and correct.</li><li><b>Byzantine (arbitrary):</b> worst case—server can lie, behave maliciously, or send different values to different recipients. Requires 2k+1 replicas to tolerate k Byzantine failures (vs. k+1 for crashes), because you need a two-thirds majority to outvote the traitors.</li><li><b>Key insight:</b> a 'simple' failure at a lower level can manifest as Byzantine at a higher level (e.g., a bit-flip in memory corrupts a value that is then replicated by gossip—as in the Amazon S3 2008 incident).</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT Basics · Replication Count","q":"How many replicas are needed to tolerate k crash failures versus k Byzantine failures? Intuitively explain why the Byzantine case requires so many more.","a":"<b>Crash:</b> k+1 replicas. <b>Byzantine:</b> 2k+1 replicas (for passive masking via majority vote).<ul><li><b>Crash intuition:</b> if k replicas crash, at least one of k+1 is still alive and correct. A single surviving replica suffices to serve requests.</li><li><b>Byzantine intuition:</b> a Byzantine replica can send any value—including a value specifically crafted to look correct to a majority. With 2k+1, the k faulty replicas can muster at most k votes for a wrong value, while k+1 correct replicas outvote them. You need a strict majority of correct processes.</li><li><b>Consequence:</b> Byzantine fault tolerance is expensive and typically reserved for safety-critical or adversarial contexts. Most commercial distributed systems assume crash failures only and use k+1 replicas.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT2 · Reliable Multicast","q":"A colleague suggests adding reliability to multicast by having all receivers send an ACK to the sender, which retransmits on a missing ACK. Do you agree this is a good approach? Explain why or why not, and how it could be improved.","a":"No—this design has a fundamental scalability problem known as <b>ACK implosion (feedback implosion)</b>.<ul><li>With N receivers, a single multicast generates up to N ACKs at the sender simultaneously. The sender becomes a bottleneck; its network interface and processing are overwhelmed as group size grows.</li><li><b>Mitigation 1 – NACKs (negative ACKs):</b> receivers only send feedback when they detect a loss (e.g., via a gap in sequence numbers). Traffic is proportional to <i>losses</i>, not group size. Problem: the sender may have to cache messages indefinitely in case a NACK arrives late.</li><li><b>Mitigation 2 – SRM (Scalable Reliable Multicast):</b> NACKs are themselves multicast with random staggering. A receiver that sees someone else's NACK suppresses its own—reducing duplicate repair requests.</li><li><b>Mitigation 3 – Hierarchical feedback:</b> receivers are organised into a tree; ACKs travel up the tree, collapsing many acknowledgements into one. The sender's fanout is bounded. Cost: constructing and maintaining the hierarchy is complex.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT2 · Virtual Synchrony","q":"What problem does virtual synchrony solve in reliable group communication, and what key property does it guarantee about multicasts and view changes?","a":"Virtual synchrony (VS) addresses the problem of dynamic group membership: processes can join, leave, or crash while multicasts are in flight, making it unclear which processes should receive which messages.<ul><li><b>Core guarantee:</b> multicasts do not cross epoch (view) boundaries. A message multicast in view V either (a) is delivered to <i>all</i> operational members of V before the next view is installed, or (b) is delivered to <i>none</i> of them. (Case (b) is only allowed if the sender crashes.)</li><li><b>Why this matters:</b> without VS, process R could receive a message that P did not, and then P would be informed of R's crash without ever having seen that message—leading to inconsistent state. VS ensures consistent group membership knowledge.</li><li><b>View:</b> each process's local knowledge of the current group. All correct processes install the same sequence of views.</li><li>VS simplifies reasoning about group communication by making group changes appear instantaneous and atomic with respect to message delivery.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT3 · Message Ordering","q":"When is total ordering strictly necessary over causal ordering? Give a concrete scenario where causal ordering would be insufficient.","a":"Total ordering is necessary when <i>concurrent writes</i> must be seen in the same order by all processes, even if those writes are causally unrelated.<ul><li><b>Causal ordering</b> only constrains causally related messages; concurrent messages may be delivered in any order at different receivers.</li><li><b>Scenario – Replicated bank account:</b> processes P1 and P2 concurrently deposit and withdraw from the same account. Their operations are causally unrelated (neither read the other's write). With only causal ordering, some replicas may apply 'deposit then withdraw' and others 'withdraw then deposit', ending up with different balances. Total ordering ensures every replica sees the same sequence.</li><li><b>Another scenario – Chat room:</b> two users send messages simultaneously. Causal ordering allows different clients to see them in different orders, producing an inconsistent conversation thread. Total ordering gives everyone the same transcript.</li><li>Note: total ordering is <i>independent</i> of causal ordering—you may need causal+total, or just one, depending on the application.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT3 · Message Ordering","q":"Why is implementing causal multicast more expensive than FIFO multicast? What additional information must each message carry, and what bookkeeping does each process maintain?","a":"Causal multicast must track <i>all causal dependencies</i> across processes, not just per-sender sequence numbers.<ul><li><b>FIFO</b> requires only a per-sender sequence number on each message and a per-sender counter at each receiver—O(1) per message.</li><li><b>Causal multicast</b> uses <i>vector clocks</i>: each message carries a full n-dimensional timestamp (one entry per process). Each process buffers an incoming message until all messages that causally precede it have already been delivered.</li><li>Cost: O(n) per message for the timestamp (n = number of processes); O(n) per process for the vector clock. In large groups this overhead can be significant.</li><li>The benefit is that causal multicast prevents confusing orderings (e.g., seeing a reply before its original message) without the stricter global synchronisation that total ordering requires.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT4 · Consensus","q":"The FLP impossibility result states that consensus cannot be solved deterministically in an asynchronous system with even one crash failure. What is the intuitive reason, and how do practical systems work around it?","a":"The core problem is that in an asynchronous system, a slow process is indistinguishable from a crashed one.<ul><li><b>FLP intuition:</b> suppose a consensus algorithm is about to decide. There is always a point where one process's participation is pivotal. If that process is just slow, waiting for it blocks progress (liveness). If the algorithm decides without it, and the process later delivers a different vote, safety could be violated. No algorithm can correctly distinguish slow from crashed, so no deterministic algorithm can guarantee both safety and liveness.</li><li><b>Workaround 1 – Synchrony assumption:</b> in a synchronous system (bounded message delays, known timeout) a crash <i>is</i> detectable. Paxos, Raft, and 3PC all assume partial or eventual synchrony.</li><li><b>Workaround 2 – Randomisation:</b> algorithms like Ben-Or use random choices to break symmetry, achieving consensus with probability 1 (but not deterministically in finite rounds).</li><li><b>Workaround 3 – Failure detectors:</b> assume an oracle that eventually suspects crashed processes correctly; Chandra-Toueg show this is the minimal assumption needed.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT5 · Atomic Commit","q":"Why is two-phase commit (2PC) a blocking protocol? Describe precisely the state in which a participant blocks, and explain why it cannot safely decide unilaterally.","a":"2PC is blocking because a participant that has voted YES enters an <b>uncertainty (READY) state</b> from which it cannot proceed without the coordinator's decision.<ul><li>After voting YES, the participant knows it <i>could</i> commit, but it cannot commit unilaterally—the coordinator might have decided ABORT (e.g., because another cohort voted NO or timed out).</li><li>It also cannot abort unilaterally—the coordinator might have decided COMMIT and crashed before sending it.</li><li>The <i>termination protocol</i> (ask other participants) does not help: if no other participant has received the decision, the group collectively cannot resolve the outcome.</li><li><b>Root cause:</b> in 2PC a participant can transition from READY directly to COMMIT (or ABORT) in the coordinator's state machine, meaning there is no intermediate state that rules out either decision. Survivors cannot distinguish 'coordinator decided COMMIT and crashed' from 'coordinator decided ABORT and crashed'.</li><li>The practical consequence: if the coordinator and all participants in READY crash simultaneously, the system blocks until the coordinator recovers—potentially a very long time.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT5 · Atomic Commit","q":"Three-phase commit (3PC) is described as non-blocking. What key property (P1) does it maintain, and how does the PRECOMMIT state enforce it?","a":"3PC introduces an invariant that eliminates the ambiguity that blocks 2PC participants.<ul><li><b>P1:</b> <i>If any operational process is in the uncertain (READY) state, then no process—operational or failed—can have decided COMMIT.</i></li><li><b>How PRECOMMIT enforces P1:</b> before sending COMMIT, the coordinator first moves all cohorts to PRECOMMIT (informing them that everyone voted YES). A participant in READY therefore knows that nobody can yet have committed, so it is safe to collectively ABORT without blocking.</li><li><b>Termination protocol:</b> the surviving processes elect a new coordinator; if all survivors are in READY → ABORT (P1 guarantees no one committed); if any is in PRECOMMIT or COMMIT → move all to PRECOMMIT then COMMIT.</li><li><b>Critical assumption:</b> 3PC is non-blocking only under <i>partial crash failures</i> in a synchronous network. Network partitions or performance failures violate P1 (a partitioned READY node may time out and ABORT while the other partition COMMITs), making 3PC incorrect. The fix (majority rule) reintroduces blocking for the minority partition.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT5 · Atomic Commit","q":"Summarise the failure modes that 2PC and 3PC can handle correctly, and identify where each protocol falls short.","a":"<table><tr><td><b>Protocol</b></td><td><b>Crash (partial)</b></td><td><b>Network / perf. faults</b></td><td><b>Total crash</b></td></tr><tr><td>2PC</td><td>Correct, but <b>blocking</b></td><td>Correct, but <b>blocking</b></td><td>Correct, <b>blocking</b></td></tr><tr><td>3PC (base)</td><td><b>Non-blocking</b></td><td><b>Incorrect</b> (violates P1)</td><td>Blocking (needs Bernstein et al. fix)</td></tr><tr><td>3PC + majority</td><td>Non-blocking</td><td>Correct, but <b>blocks minority</b></td><td>Blocking</td></tr></table><ul><li>2PC's strength is correctness under all failure modes; its weakness is always blocking in the READY state if the coordinator crashes.</li><li>3PC's strength is non-blocking for partial crashes; its weakness is unsoundness under network partitions (which look indistinguishable from crashes to a node).</li><li>In practice most systems use 2PC (or variants like Paxos-commit) and accept blocking as a rare-but-possible event.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Synchronisation · Physical Clocks","q":"A developer designs a clock-sync protocol where the client simply sets its clock to T_server − T_client upon receiving the server's time. Your tech lead says there are at least two serious problems. What are they, and how should each be fixed?","a":"<b>Problem 1 – Clock can go backwards.</b> If T_server &lt; C_client (client is ahead of the server), directly applying the offset would set the client's clock to an earlier time. Applications that stamp files or events with monotonically increasing timestamps would produce stamps in the past, causing software to believe future events already happened (e.g., make skipping recompilation).<br><b>Fix:</b> never jump the clock backward. Instead, slow it down (e.g., advance by 9 ms per 10 ms tick) until it realigns with the correct time—preserving monotonicity.<br><br><b>Problem 2 – Network latency is ignored.</b> By the time the client receives the server's time T_server, a non-zero amount of time has elapsed. Simply setting the clock to T_server + 0 leaves a systematic error equal to roughly half the round-trip time.<br><b>Fix:</b> measure the round-trip time (send T_1, receive reply with server's T_2 and T_3, note local T_4) and compute the offset as θ = ((T_2 − T_1) + (T_3 − T_4)) / 2. This is the approach used by NTP."},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Synchronisation · Logical Clocks","q":"Lamport's scalar clocks guarantee clock consistency (e → e' ⟹ LC(e) < LC(e')), but not strong clock consistency. What is the difference, and why does it matter for reasoning about distributed executions?","a":"<b>Clock consistency:</b> if e happens-before e', then LC(e) &lt; LC(e'). This is what Lamport's scalar clocks guarantee.<br><b>Strong clock consistency:</b> additionally, LC(e) &lt; LC(e') ⟹ e happens-before e'. This is the converse direction.<ul><li>Scalar clocks do <i>not</i> satisfy the strong property: two concurrent events (e ∥ e') may still have LC(e) &lt; LC(e'), making them look causally ordered when they are not.</li><li><b>Why it matters:</b> you can use scalar timestamps to rule out a causal relationship (if LC(e) ≥ LC(e') then e does not happen-before e'), but you cannot confirm one (LC(e) &lt; LC(e') is a necessary, not sufficient, condition).</li><li><b>Vector clocks</b> satisfy strong clock consistency: e → e' ⟺ VC(e) &lt; VC(e'). This allows unambiguous determination of causality and concurrency from timestamps alone—at the cost of O(n) per message.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Synchronisation · Distributed Snapshots","q":"Why must a distributed snapshot record a consistent cut, and why is the naïve approach (stop all processes, drain channels, record state) considered unacceptable in practice?","a":"A consistent cut ensures the recorded global state is one that <i>could have occurred</i> in a real execution—a message recorded as received must also be recorded as sent.<ul><li><b>Inconsistent cut problem:</b> if process P records a message m as received, but the cut is taken before the sender Q recorded sending m, the snapshot shows money (or data) appearing from nowhere—an impossible state that corrupts any analysis built on the snapshot.</li><li><b>Definition:</b> a cut C is consistent if: for all events e ∈ C, every event e' with e' → e is also in C.</li><li><b>Why stopping everything is unacceptable:</b><ul><li>It halts the entire distributed computation—unacceptable in production systems (databases serving thousands of queries).</li><li>Draining channels reliably is non-trivial in an asynchronous system where message delays are unbounded.</li><li>Coordination overhead is huge: all processes must synchronise on a global 'pause'.</li></ul></li><li><b>Chandy-Lamport algorithm</b> solves this without stopping the computation: snapshot recording is interleaved with normal processing using marker tokens on FIFO reliable channels, with no global pause needed.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Synchronisation · Mutual Exclusion","q":"Compare the centralised, Lamport distributed, and token-ring approaches to mutual exclusion. Which is most message-efficient per critical section entry, and what is each approach's main vulnerability?","a":"<table><tr><td><b>Algorithm</b></td><td><b>Messages / entry</b></td><td><b>Delay</b></td><td><b>Vulnerability</b></td></tr><tr><td>Centralised</td><td>3</td><td>2</td><td>Coordinator crash = single point of failure</td></tr><tr><td>Lamport distributed</td><td>3(n−1)</td><td>2(n−1)</td><td>Crash of any process blocks the algorithm</td></tr><tr><td>Token ring</td><td>1 to ∞</td><td>0 to n−1</td><td>Lost token; process crash disrupts the ring</td></tr></table><ul><li>The centralised approach is the most message-efficient and most commonly used in practice, despite its single point of failure—the coordinator can be replicated.</li><li>The token ring has zero delay when no one else wants the resource, but a lost token must be detected and regenerated (complex).</li><li>Ironically, the distributed Lamport algorithm is the most vulnerable to individual process crashes, since every process participates in every grant decision—one silent crash blocks everyone.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Synchronisation · Leader Election","q":"Why is leader election needed in distributed systems, and what does it fundamentally require from the set of participants?","a":"Many distributed algorithms—mutual exclusion, 2PC coordination, MapReduce master—require one process to act as a coordinator. When the current leader fails, a new one must be selected automatically.<ul><li><b>Core requirement:</b> processes must be <i>distinguishable</i> by some unique identifier (e.g., IP address, process ID). Without unique IDs there is no way to break symmetry and converge on a single leader—all processes look identical.</li><li><b>Closed system assumption:</b> processes know the set of participants (though not who has crashed). This allows algorithms to enumerate candidates.</li><li><b>Bully algorithm:</b> the process with the highest ID always wins. It 'bullies' lower-ID processes out of contention by sending ELECTION messages upward and waiting for a response. Efficient if the winner is likely to be reachable.</li><li><b>Ring algorithm:</b> each process circulates its ID; the highest ID among all that complete the ring becomes leader. Tolerates multiple simultaneous elections that eventually converge.</li><li><b>Key property:</b> both algorithms assume reliable links and the ability to detect crashes (e.g., via timeout).</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Big Systems · MapReduce","q":"MapReduce hides the complexity of distributed execution from the programmer. What specific distributed systems problems does the framework handle transparently, and what is the programmer's responsibility?","a":"The programmer only specifies two functions: <b>Map</b> (key-value → intermediate key-values) and <b>Reduce</b> (key + list-of-values → output). The framework handles everything else.<ul><li><b>Parallelisation:</b> input is automatically split into M chunks; M map tasks run in parallel across the cluster.</li><li><b>Data distribution:</b> intermediate key-value pairs are partitioned into R buckets and shuffled to reduce workers by a user-supplied partitioning function (default: hash(key) mod R).</li><li><b>Fault tolerance:</b> the master pings workers periodically. A failed map worker's completed tasks are re-executed (output is on local disk, inaccessible after crash). Completed reduce tasks need not be re-run (output is on GFS). Master failure: restart from checkpoint.</li><li><b>Straggler mitigation:</b> near the end, the master schedules backup executions of in-progress tasks; the first to finish wins. This significantly reduces tail latency (jobs completing ~40% faster in experiments).</li><li><b>Locality:</b> the master assigns map tasks preferentially to workers that already hold a replica of the input chunk in GFS, minimising network transfer.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Big Systems · GFS Design","q":"Google File System (GFS) makes several unusual design choices that deviate from traditional file system design. Explain two such choices and the reasoning behind them.","a":"<ul><li><b>Large chunk size (64 MB):</b> conventional file systems use small blocks (4–8 KB). GFS uses 64 MB chunks. This drastically reduces the metadata the master must track, keeps hot chunk locations small in memory, and reduces the number of requests for sequential large reads. Downside: small files may waste space or create hot spots if many clients access the same chunk simultaneously.</li><li><b>Relaxed consistency (append-only, not arbitrary write):</b> GFS is optimised for append-dominated workloads (logs, web crawls). It provides 'at-least-once' append semantics—a record may appear more than once if the primary chunk server crashes mid-append. Clients are expected to tolerate duplicate records (e.g., by using unique IDs). This avoids the expensive distributed locking that strict write consistency would require.</li><li><b>Single master:</b> a centralised master holds all metadata in memory for fast access. Avoiding distributed metadata lookups simplifies consistency. The master is protected by operation logs and checkpoints rather than full replication. This is practical because metadata is small relative to data volume.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Big Systems · CAP Tradeoff","q":"In the context of large-scale distributed data stores, informally explain the CAP tradeoff. Why can a system not simultaneously guarantee consistency, availability, and partition tolerance?","a":"CAP (Brewer's conjecture, formalised by Gilbert and Lynch) states that a distributed system can provide at most two of three properties simultaneously.<ul><li><b>Consistency (C):</b> every read returns the most recent write (equivalent to linearisability).</li><li><b>Availability (A):</b> every non-failing node returns a response (no indefinite blocking).</li><li><b>Partition tolerance (P):</b> the system continues operating when the network splits into disconnected groups.</li><li><b>Why not all three:</b> during a network partition, messages between partitions are lost. To maintain consistency, nodes in one partition must refuse to serve reads (since they cannot confirm the latest write from the other partition)—sacrificing availability. To maintain availability, they serve reads with possibly stale data—sacrificing consistency. Since network partitions occur in any real distributed system, P cannot be given up; the practical choice is between CP (e.g., ZooKeeper, HBase) and AP (e.g., Dynamo, Cassandra with eventual consistency).</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"ZooKeeper · Design Rationale","q":"ZooKeeper deliberately provides a general-purpose coordination kernel rather than implementing specific coordination primitives like locks directly. What is the motivation for this design choice, and what does it enable?","a":"Providing ready-made locks would fix the semantics for one use case; a general kernel lets applications build exactly the primitives they need.<ul><li><b>Motivation:</b> different applications need different coordination patterns—leader election, distributed locks, barrier synchronisation, group membership, service discovery, configuration management. No single primitive covers all cases without inefficiency or unsafe corner cases for the others.</li><li><b>ZooKeeper's primitive:</b> a hierarchical namespace of znodes (persistent, ephemeral, sequential) plus watches (one-time notifications on znode changes) and strong ordering guarantees (sequentially consistent writes, monotonic reads within a session).</li><li><b>What it enables:</b><ul><li><b>Locks:</b> create an ephemeral sequential znode; check if you hold the smallest sequence number.</li><li><b>Leader election:</b> ephemeral znode /master; whoever creates it is leader; others watch for its deletion.</li><li><b>Queues:</b> sequential znodes under /tasks; master watches for new children.</li></ul></li><li>This composability means ZooKeeper has proven useful far beyond Google's original use cases (Hadoop, Kafka, Storm, etc. all use it).</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"ZooKeeper · Consistency Model","q":"ZooKeeper's consistency model is a hybrid that does not provide read-your-writes or writes-follow-reads. Explain what guarantees it does provide and why the omission of those two can cause surprises.","a":"ZooKeeper gives: sequentially consistent writes (all servers see writes in the same order), monotonic reads (within a session), and write-your-reads within a session. It does <i>not</i> guarantee read-your-writes across sessions, or writes-follow-reads.<ul><li><b>Reads are local:</b> a client always reads from its connected server. That server may be behind on applying writes from the ensemble. A client can therefore read a stale value even after having performed a write that already succeeded at another server.</li><li><b>Hidden channels problem:</b> if client A writes to ZooKeeper then notifies client B via a direct socket (outside ZooKeeper), B's subsequent read from ZooKeeper may not see A's write—a causality violation from the application's perspective.</li><li><b>Fix:</b> call sync(/path) before the read. This forces the connected server to flush all pending updates for that path, effectively 'catching up' before the read proceeds—analogous to a synchronisation variable in weak consistency.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"ZooKeeper · Performance","q":"ZooKeeper's performance scales well with the number of servers for read-heavy workloads but degrades for write-heavy ones. Explain the architectural reason for this asymmetry.","a":"Reads and writes are handled very differently in ZooKeeper's architecture.<ul><li><b>Reads:</b> every server in the ensemble can serve reads locally, without coordinating with the others. Adding more servers linearly increases the read throughput (more servers share the load). At 100% reads, a 13-server ensemble achieves ~460k requests/sec.</li><li><b>Writes:</b> writes must be agreed upon by a quorum (majority) of servers via ZAB (ZooKeeper Atomic Broadcast), a protocol similar to Paxos. Every write requires at least ⌈(N+1)/2⌉ round-trips across the ensemble. Adding more servers increases the quorum size and thus the coordination overhead—write throughput decreases as the ensemble grows.</li><li><b>Consequence:</b> ZooKeeper is designed for workloads where #reads ≫ #writes (recommended ratio 2:1 to 100:1). Configuration and coordination data is read far more often than it is written—a perfect fit for ZooKeeper's architecture.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"IoT & WSN · Design Constraints","q":"Wireless sensor networks operate under constraints that are absent in conventional distributed systems. Identify the most critical constraints and explain how they change the design of distributed algorithms.","a":"WSNs are resource-constrained embedded systems; the dominant constraint is <b>energy</b>, but the full set is interconnected.<ul><li><b>Energy:</b> nodes run on small batteries that may be irreplaceable (deployed in the field). Radio transmission is the largest energy consumer—sending one byte costs roughly as much as executing thousands of CPU instructions. Algorithms must minimise transmissions above all else.</li><li><b>Computation:</b> tiny microcontrollers (e.g., 4–8 MHz, kilobytes of RAM). Complex cryptographic or consensus algorithms are infeasible.</li><li><b>Bandwidth:</b> low-power radios operate at tens to hundreds of kbps with shared, collision-prone channels. Reliability requires MAC-layer and network-layer retransmissions, all of which cost energy.</li><li><b>Impact on algorithm design:</b><ul><li>Flooding and gossip replace unicast for reliability—many short messages over multi-hop paths.</li><li>Multi-hop routing is preferred over long-range communication (transmit power ∝ distance²).</li><li>In-network aggregation (compute partial results at intermediate nodes) reduces the total bytes transmitted.</li><li>Duty cycling (radio off most of the time) trades latency for energy.</li></ul></li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"IoT & WSN · Multi-hop vs Long-range","q":"In WSNs, multi-hop communication is generally preferred over direct long-range transmission, even when a direct path exists. Explain the reasoning.","a":"The key insight is that radio transmit power scales with the <b>square</b> (or higher) of distance: P ∝ d².<ul><li>Sending a message over distance 2d directly costs 4× (or more) the energy of sending it over distance d.</li><li>Two hops of distance d each cost 2 × (energy for d) = 2× the per-hop cost, which is still far less than 4× for the direct link.</li><li>As the number of hops increases, energy savings compound—making multi-hop with short-range radios and cheap commodity nodes far more energy-efficient than a few high-power transceivers.</li><li>Additionally, many cheap short-range sensors provide better spatial coverage and redundancy than a few expensive long-range ones—both reducing cost and improving fault tolerance.</li><li><b>Trade-off:</b> multi-hop introduces latency (each hop adds a receive-forward delay), requires routing protocols that consume additional memory and computation, and creates complex reliability challenges (each hop is a new point of failure). These are accepted costs given the energy savings.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"FT Basics · RPC Invocation Semantics","q":"Explain the difference between at-least-once, at-most-once, and maybe (best-effort) RPC invocation semantics. Under what conditions is each appropriate?","a":"These semantics describe what happens when a client times out and must decide whether to retransmit the request.<ul><li><b>Maybe (best-effort):</b> the client sends the request and does not retry. If the reply is lost or the server crashes, the operation simply did not happen (from the client's perspective). Appropriate for fire-and-forget operations where occasional loss is acceptable (e.g., UDP-based metrics).</li><li><b>At-least-once:</b> the client retransmits until it gets a reply. The server may execute the operation multiple times. Correct only for <i>idempotent</i> operations (executing them multiple times has the same effect as once, e.g., 'set x to 5' but not 'increment x by 1').</li><li><b>At-most-once:</b> the server deduplicates requests using a per-client sequence number and a cache of recent replies. The operation executes at most once regardless of retransmissions. Required for non-idempotent operations (database updates, money transfers).</li><li>DCE RPC offers at-most-once as its primary semantic; the programmer can opt into idempotent semantics for performance.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Replication · Epidemic Algorithms","q":"Epidemic (gossip) algorithms are described as 'intrinsically distributed and redundant'. What properties make them attractive for large-scale update dissemination, and what is their key limitation?","a":"Epidemic algorithms model update propagation on infectious disease spreading—each node that receives an update randomly infects a small number of neighbours.<ul><li><b>Scalability:</b> the fanout (number of contacts per round) is proportional to log(N), so the total message overhead is O(N log N) to infect all N nodes—near-optimal.</li><li><b>Fault tolerance:</b> there is no single coordinator; messages travel redundant paths. Node and link failures naturally cause rerouting without any explicit failure handling.</li><li><b>Resilience to topology changes:</b> nodes come and go; the algorithm self-heals because each round independently samples random partners.</li><li><b>Key limitation:</b> epidemic algorithms are <i>probabilistic</i>. They cannot give deterministic delivery guarantees—with small probability, some node may never receive the update (analogous to a person who never contacts an infected person). In systems requiring guaranteed delivery (e.g., atomic commit) this is unacceptable; epidemic algorithms are therefore used for best-effort scenarios (e.g., Amazon Dynamo's anti-entropy, GFS chunk location updates).</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Synchronisation · Transactions","q":"What are the ACID properties of transactions, and which of them is most challenging to achieve in a distributed setting? Explain why.","a":"ACID stands for Atomicity, Consistency, Isolation, and Durability.<ul><li><b>Atomicity:</b> all operations in the transaction commit or all are rolled back—no partial results visible.</li><li><b>Consistency:</b> the transaction takes the system from one consistent state to another; no invariants are violated.</li><li><b>Isolation (Serializability):</b> concurrent transactions appear to execute serially—intermediate states are not visible to other transactions.</li><li><b>Durability:</b> committed results survive crashes (written to stable storage).</li><li><b>Most challenging in distributed settings: Atomicity</b>—implemented by atomic commitment protocols (2PC, 3PC). The difficulty is that participant nodes may crash independently, and the coordinator must ensure all-or-nothing across multiple independent machines with no shared memory. Isolation is also hard (requires distributed concurrency control, e.g., distributed locking or timestamp ordering). Durability requires stable storage at each node but is relatively straightforward. Consistency is application-defined and checked per-transaction.</li></ul>"},
  {"deck":"Exam-Style · Theory & Reasoning","ref":"Big Systems · Commodity Hardware","q":"Google's infrastructure deliberately chooses commodity PC clusters over high-end servers. Explain the trade-off this introduces and how the system design accounts for the resulting unreliability.","a":"Commodity hardware is cheaper per unit but fails far more frequently than enterprise-grade servers.<ul><li><b>Economic argument:</b> a rack of 176 commodity 2 GHz Xeons (176 GB RAM, 7 TB disk) costs ~$278k. A comparable high-end server configuration (8 CPUs, 64 GB, 8 TB) costs ~$758k. At Google's scale, thousands of racks make this difference enormous.</li><li><b>Reliability consequence:</b> with thousands of machines, some are always failing. Disk failures, memory errors, network failures, and whole-machine crashes happen daily.</li><li><b>Accounting for unreliability in software:</b><ul><li><b>Replication:</b> GFS stores 3 copies of every chunk; losing one copy triggers re-replication.</li><li><b>Re-execution:</b> MapReduce workers that fail have their tasks rescheduled. Completed map tasks are re-run (local disk is lost); reduce tasks need not be (output is in GFS).</li><li><b>Stragglers:</b> backup task execution for near-complete jobs avoids being held up by one slow machine.</li><li><b>Checksums:</b> every GFS chunk is verified on read; corruption triggers use of another replica.</li></ul></li></ul>"}
];
/* ================================================= */

const $ = s => document.querySelector(s);
const LS = {
  get k(){ return 'ds_flash_known_v1'; },
  known(){ try{ return new Set(JSON.parse(localStorage.getItem(this.k)||'[]')); }catch(e){ return new Set(); } },
  saveKnown(set){ localStorage.setItem(this.k, JSON.stringify([...set])); },
};

let known = LS.known();
let state = { deck:'__ALL__', order:[], idx:0, onlyUnknown:false };

// Build deck list
const decks = [...new Set(CARDS.map(c=>c.deck))];
const deckSel = $('#deckSel');
function rebuildDeckOptions(){
  deckSel.innerHTML='';
  const optAll=document.createElement('option');
  optAll.value='__ALL__'; optAll.textContent=`All decks (${CARDS.length})`;
  deckSel.appendChild(optAll);
  decks.forEach(d=>{
    const n=CARDS.filter(c=>c.deck===d).length;
    const o=document.createElement('option');o.value=d;o.textContent=`${d} (${n})`;
    deckSel.appendChild(o);
  });
}
rebuildDeckOptions();

function cardId(c){ return c.deck+'::'+c.q; }

function pool(){
  let list = state.deck==='__ALL__' ? CARDS : CARDS.filter(c=>c.deck===state.deck);
  if(state.onlyUnknown) list = list.filter(c=>!known.has(cardId(c)));
  return list;
}

function buildOrder(shuffle){
  const list = pool();
  let ord = list.map((_,i)=>i);
  if(shuffle){ for(let i=ord.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [ord[i],ord[j]]=[ord[j],ord[i]]; } }
  state.order = ord; state.idx=0;
  state._list = list;
}

function current(){ return state._list[ state.order[state.idx] ]; }

function render(){
  const list = state._list || [];
  const total = state.order.length;
  $('#deckName').textContent = state.deck==='__ALL__' ? 'All decks' : state.deck;
  $('#knownCount').textContent = `${known.size} known`;
  if(total===0){
    $('#frontTag').textContent='Done';
    $('#srcLabel').textContent='';
    $('#qText').textContent = state.onlyUnknown ? 'No unknown cards left here — nice!' : 'No cards in this deck.';
    $('#aText').textContent='';
    $('#counter').textContent='0 / 0'; $('#navNum').textContent='0/0';
    $('#progFill').style.width='0%';
    return;
  }
  if(state.idx>=total) state.idx=total-1;
  const c = current();
  $('#flip').classList.remove('flipped');
  $('#srcLabel').textContent = (c.deck) + (c.ref? ' · '+c.ref : '');
  $('#qText').textContent = c.q;
  $('#aText').innerHTML = c.a;
  const isKnown = known.has(cardId(c));
  $('#frontTag').innerHTML = isKnown ? '<span class="known-dot"></span>Question' : 'Question';
  $('#knownBtn').textContent = isKnown ? '✓ Known' : '○ Mark known';
  $('#counter').textContent = `${state.idx+1} / ${total}`;
  $('#navNum').textContent = `${state.idx+1}/${total}`;
  $('#progFill').style.width = (100*(state.idx+1)/total)+'%';
}

function refresh(shuffle=false){ buildOrder(shuffle); render(); }

// Events
$('#flip').addEventListener('click',()=>$('#flip').classList.toggle('flipped'));
$('#nextBtn').addEventListener('click',()=>{ if(state.idx<state.order.length-1){state.idx++;render();} });
$('#prevBtn').addEventListener('click',()=>{ if(state.idx>0){state.idx--;render();} });
$('#shuffleBtn').addEventListener('click',()=>refresh(true));
deckSel.addEventListener('change',()=>{ state.deck=deckSel.value; refresh(false); });
$('#onlyUnknown').addEventListener('change',e=>{ state.onlyUnknown=e.target.checked; refresh(false); });
$('#knownBtn').addEventListener('click',()=>{
  const c=current(); if(!c) return;
  const id=cardId(c);
  if(known.has(id)) known.delete(id); else known.add(id);
  LS.saveKnown(known); render();
});
$('#resetBtn').addEventListener('click',()=>{
  if(confirm('Reset all "known" progress?')){ known=new Set(); LS.saveKnown(known); refresh(false); }
});

// Swipe gestures
let sx=0,sy=0,st=0;
const scene=document.querySelector('.scene');
scene.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;st=Date.now();},{passive:true});
scene.addEventListener('touchend',e=>{
  const t=e.changedTouches[0];const dx=t.clientX-sx,dy=t.clientY-sy;
  if(Date.now()-st<600 && Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0){ if(state.idx<state.order.length-1){state.idx++;render();} }
    else{ if(state.idx>0){state.idx--;render();} }
  }
},{passive:true});

// Keyboard (desktop)
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') $('#nextBtn').click();
  else if(e.key==='ArrowLeft') $('#prevBtn').click();
  else if(e.key===' '){ e.preventDefault(); $('#flip').click(); }
  else if(e.key.toLowerCase()==='k') $('#knownBtn').click();
});

// Keep the dropdown in sync with state on load (browsers may restore a stale <select> value across reloads)
deckSel.value = state.deck;
if(deckSel.selectedIndex < 0) deckSel.value = '__ALL__';
refresh(false);
</script>
</body>
</html>
